<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archives - RadioLog</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Basic layout styles to ensure visibility */
        .table-container { margin-top: 20px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        .hidden { display: none; }
        .btn-amber { background-color: #ffbf00; color: black; border: none; padding: 8px 16px; cursor: pointer; border-radius: 4px; }
        .del-btn { background-color: #ff4757; color: white; border: none; padding: 4px 8px; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body class="history-layout">
    <header class="hud">
        <h1>Archives</h1>
        <nav>
            <a href="main.html">Log</a>
            <a href="history.html" class="active">History</a>
        </nav>
    </header>

    <div class="toolbar">
        <input type="text" id="search-bar" placeholder="Filter by Callsign/Date...">
        <div class="actions">
            <button id="sync-btn" class="btn-amber hidden">Sync to Cloud</button>
            <button id="export-adif">Export ADIF</button>
            <button id="export-csv">Export CSV</button>
        </div>
    </div>

    <div class="table-container">
        <table id="qso-table">
            <thead>
                <tr>
                    <th>Date/Time (UTC)</th>
                    <th>Callsign</th>
                    <th>Freq</th>
                    <th>Mode</th>
                    <th>Sent/Rcv</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="qso-body">
                </tbody>
        </table>
    </div>

    <script type="module" src="history.js"></script>
</body>
</html>
