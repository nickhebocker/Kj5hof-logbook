<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>KJ5HOF Logbook</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <strong>KJ5HOF Log</strong>
  <button id="darkToggle" style="width: auto; padding: 5px 10px;">🌓</button>
</header>

<div id="map"></div>

<section id="stats-bar">
  <span id="stats">QSOs: 0</span>
  <div>
    <select id="bandFilter"><option value="">Bands</option></select>
    <select id="modeFilter"><option value="">Modes</option></select>
  </div>
</section>

<section id="editor">
  <input id="call" placeholder="Callsign" autocomplete="off">

  <div class="row">
    <input id="band" placeholder="Band">
    <input id="mode" placeholder="Mode">
  </div>

  <div class="row">
    <input id="lat" placeholder="Lat">
    <input id="lon" placeholder="Lon">
    <input id="grid" placeholder="Grid">
  </div>

  <div class="actions">
    <button id="saveQSO">Save QSO</button>
    <button id="deleteQSO" style="display:none">Delete</button>
    <button id="clearBtn">Clear / New</button>
  </div>
</section>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="app.js"></script>
</body>
</html>
