<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RadioLog - Gateway</title>
</head>
<body>
    <div id="loading-spinner" class="overlay" style="display: none;">
        <div class="spinner"></div>
    </div>

    <main class="auth-container">
        <div class="auth-card">
            <header>
                <h1>RadioLog</h1>
                <p>Amateur Radio Session Manager</p>
            </header>

            <div class="tabs">
                <button id="tab-login" class="active">Log In</button>
                <button id="tab-signup">Sign Up</button>
            </div>

            <form id="auth-form">
                <div class="input-group" id="callsign-group" style="display:none;">
                    <label>Callsign</label>
                    <input type="text" id="reg-callsign" placeholder="e.g. K1ABC">
                </div>
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="email" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" required>
                        <button type="button" id="toggle-pw">👁️</button>
                    </div>
                </div>
                <button type="submit" id="submit-btn" class="btn-primary">Authenticate</button>
                <a href="#" id="reset-pw">Forgot Password?</a>
            </form>

            <div class="divider"><span>OR</span></div>

            <button id="guest-btn" class="btn-secondary">Continue as Guest</button>
        </div>
    </main>

    <script type="module" src="index.js"></script>
</body>
</html>
