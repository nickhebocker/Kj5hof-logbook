<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KJ5HOF Mobile Logbook</title>
    <link rel="stylesheet" href="style.css">
    </head>
<body>
    <div class="wrapper">
        <header>
            <h1>KJ5HOF Log</h1>
            <div id="status-indicator">
                <span id="connection-status">Checking...</span>
            </div>
        </header>

        <main>
            <form id="log-form">
                <div class="form-row">
                    <input type="text" id="callsign" placeholder="CALLSIGN" required autocomplete="off">
                </div>
                
                <div class="form-row">
                    <input type="text" id="frequency" placeholder="MHz (e.g. 14.250)" required inputmode="decimal">
                    <select id="mode">
                        <option value="SSB">SSB</option>
                        <option value="CW">CW</option>
                        <option value="FT8">FT8</option>
                        <option value="FM">FM</option>
                        <option value="DMR">DMR</option>
                    </select>
                </div>

                <div class="form-row">
                    <input type="number" id="rstSent" placeholder="Snt" value="59">
                    <input type="number" id="rstRcvd" placeholder="Rcv" value="59">
                </div>

                <div class="form-row">
                    <textarea id="notes" placeholder="Notes (QTH, Rig, Signal info...)" rows="3"></textarea>
                </div>

                <button type="submit" id="submit-btn">SAVE ENTRY</button>
            </form>

            <section id="history-section">
                <h2>Recent Contacts</h2>
                <div id="log-entries">
                    </div>
            </section>
        </main>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
