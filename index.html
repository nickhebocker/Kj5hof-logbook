<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KJ5HOF Logbook</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <link rel="stylesheet" href="style.css">
</head>

<body>
<header>
  <h1>KJ5HOF Logbook</h1>
  <div class="toggles">
    <button id="darkToggle">Dark Mode</button>
    <button id="backupBtn">Backup JSON</button>
    <label class="file-label">Restore: <input type="file" id="restoreInput" accept=".json"></label>
  </div>
</header>

<section id="controls">
  <select id="bandFilter"></select>
  <select id="modeFilter"></select>
  <button id="zoomFiltered">Zoom to Selection</button>
  <span id="stats"></span>
</section>

<section id="editor">
  <div class="input-group">
    <input id="call" placeholder="Callsign (Tab to lookup)">
    <input id="grid" placeholder="Grid">
    <input id="lat" placeholder="Latitude">
    <input id="lon" placeholder="Longitude">
    <input id="band" placeholder="Band (e.g. 20m)">
    <input id="mode" placeholder="Mode (e.g. FT8)">
  </div>
  <div class="button-group">
    <button id="saveQSO" style="background: #28a745;">Save QSO</button>
    <button id="deleteQSO" style="background: #dc3545;">Delete Selected</button>
  </div>
</section>

<section id="io">
  <strong>Data Tools:</strong>
  <button id="exportADIF">Export ADIF</button>
  <button id="exportCSV">Export CSV</button>
  <label class="file-label">Import ADIF: <input type="file" id="importADIF" accept=".adi,.adif"></label>
</section>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="app.js"></script>
</body>
</html>
