<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KJ5HOF Logbook</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="login-overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#2c3e50; z-index:9999; display:flex; justify-content:center; align-items:center;">
        <div style="background:#34495e; padding:30px; border-radius:15px; text-align:center; box-shadow:0 10px 30px rgba(0,0,0,0.5);">
            <h2 style="color:#ecf0f1; margin-bottom:20px;">Owner Login</h2>
            <input type="email" id="login-email" placeholder="Email" style="display:block; margin:10px auto; width:250px;">
            <input type="password" id="login-pass" placeholder="Password" style="display:block; margin:10px auto; width:250px;">
            <button id="login-btn" style="width:250px;">Sign In</button>
        </div>
    </div>

    <div class="container" id="app-container" style="display:none;">
        <header>
            <h1>KJ5HOF Logbook</h1>
            <div id="connection-status">Checking Connection...</div>
            <button id="logout-btn" style="padding:5px 10px; font-size:12px; margin-top:5px; background:#e74c3c;">Logout</button>
        </header>

        <div class="main-content">
            <div class="form-container">
                <form id="log-form">
                    <input type="text" id="callsign" placeholder="Callsign" required autocomplete="off">
                    <input type="text" id="frequency" placeholder="Frequency">
                    <input type="text" id="mode" placeholder="Mode">
                    <div class="rst-row">
                        <input type="text" id="rstSent" placeholder="Sent" value="59">
                        <input type="text" id="rstRcvd" placeholder="Rcvd" value="59">
                    </div>
                    <textarea id="notes" placeholder="Notes"></textarea>
                    <button type="submit">Log Contact</button>
                </form>
            </div>
            <div id="map"></div>
        </div>

        <div class="log-entries-container">
            <h2>Recent Contacts</h2>
            <div id="log-entries"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
