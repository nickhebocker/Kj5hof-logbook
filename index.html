<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KJ5HOF Logbook</title>

  https://unpkg.com/leaflet@1.9.4/dist/leaflet.css
  https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>KJ5HOF Logbook</h1>
  <div class="toggles">
    <button id="darkToggle">Dark</button>
    <button id="backupBtn">Backup JSON</button>
    <input type="file" id="restoreInput" accept=".json">
  </div>
</header>

<section id="controls">
  <select id="bandFilter"></select>
  <select id="modeFilter"></select>
  <button id="zoomFiltered">Zoom</button>
</section>

<section id="stats"></section>

<section id="editor">
  <input id="call" placeholder="Callsign">
  <input id="lat" placeholder="Lat">
  <input id="lon" placeholder="Lon">
  <input id="band" placeholder="Band">
  <input id="mode" placeholder="Mode">
  <input id="grid" placeholder="Grid">
  <button id="saveQSO">Save</button>
  <button id="deleteQSO">Delete</button>
</section>

<section id="io">
  <button id="exportADIF">Export ADIF</button>
  <button id="exportCSV">Export CSV</button>
  <input type="file" id="importADIF" accept=".adi,.adif">
</section>

<div id="map"></div>

https://unpkg.com/leaflet@1.9.4/dist/leaflet.js>
https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js>
<script src="app.js"></script>
</body>
</html>
