<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RadioLog - Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
    <style>
        #map { height: 400px; width: 100%; border-radius: 8px; margin-bottom: 20px; }
        .dashboard-container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; }
        .log-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .info-panel { background: #f9f9f9; padding: 15px; border-radius: 8px; }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <header class="header-bar">
            <div>
                <h1>RadioLog Dashboard</h1>
                <p id="user-display">Loading...</p>
            </div>
            <div style="text-align: right;">
                <h2 id="utc-clock">00:00:00 UTC</h2>
                <button id="logout-btn">Log Out</button>
            </div>
        </header>

        <div id="map"></div>

        <div class="log-grid">
            <section class="log-entry">
                <h3>New QSO Entry</h3>
                <form id="log-form">
                    <div class="input-group">
                        <label>Target Callsign</label>
                        <input type="text" id="target-call" placeholder="e.g. W1AW" required>
                    </div>
                    <div id="remote-info" class="info-panel" style="margin: 10px 0; font-size: 0.9rem; color: #555;">
                        Enter callsign to see location...
                    </div>
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="rst-s" placeholder="RST (S)" required>
                        <input type="text" id="rst-r" placeholder="RST (R)" required>
                    </div>
                    <div style="display: flex; gap: 10px; margin-top: 10px;">
                        <input type="text" id="freq" placeholder="Frequency (MHz)" required>
                        <select id="mode">
                            <option value="SSB">SSB</option>
                            <option value="CW">CW</option>
                            <option value="FT8">FT8</option>
                            <option value="FM">FM</option>
                        </select>
                    </div>
                    <textarea id="notes" placeholder="Notes" style="width: 100%; margin-top: 10px;"></textarea>
                    <button type="submit" class="btn-primary" style="width: 100%; margin-top: 10px;">Log QSO</button>
                </form>
            </section>

            <section class="recent-logs">
                <h3>Session Status</h3>
                <div id="status-box" class="info-panel">
                    Waiting for input...
                </div>
            </section>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module" src="main.js"></script>
</body>
</html>
